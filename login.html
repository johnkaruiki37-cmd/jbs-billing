<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBS - Security Access Gate</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .auth-container { max-width: 400px; margin: 10% auto; padding: 2rem; background: #1a1f2c; border-radius: 8px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; color: #94a3b8; }
        .form-group input { width: 100%; padding: 0.6rem; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: #fff; }
        .auth-btn { width: 100%; padding: 0.7rem; background: #10b981; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
        .toggle-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #38bdf8; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <div id="login-section">
            <h2 style="margin-bottom: 1.5rem;">User Authorization</h2>
            <form action="/login-action" method="POST">
                <div class="form-group">
                    <label>Identity Identifier</label>
                    <input type="text" name="username" required placeholder="admin or user_id">
                </div>
                <div class="form-group">
                    <label>Secure Key Password</label>
                    <input type="password" name="password" required placeholder="••••">
                </div>
                <button type="submit" class="auth-btn">Execute Verification</button>
            </form>
            <div class="toggle-link" onclick="toggleAuthViews()">Need an account? Register Section</div>
        </div>

        <div id="registration-section" class="hidden">
            <h2 style="margin-bottom: 1.5rem;">System Registration</h2>
            <form action="/register-action" method="POST">
                <div class="form-group">
                    <label>Choose Username</label>
                    <input type="text" name="new_username" required placeholder="e.g., john_k">
                </div>
                <div class="form-group">
                    <label>Create Secure Key</label>
                    <input type="password" name="new_password" required placeholder="••••">
                </div>
                <button type="submit" class="auth-btn" style="background: #3b82f6;">Register New Profile</button>
            </form>
            <div class="toggle-link" onclick="toggleAuthViews()">Already registered? Back to Login</div>
        </div>
    </div>

    <script>
        function toggleAuthViews() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('registration-section').classList.toggle('hidden');
        }
    </script>
</body>
</html>
