<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Billing Logistics - Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>
 <nav class="main-navigation">
    <a href="/">Home</a>
    <a href="/login">Login</a>
    <a href="/dashboard">Invoices</a>
</nav>
    
  
  <nav class="nav-links">
        <div class="nav-logo">JOHN BILLING SYSTEM</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#dashboard">Dashboard</a>
            <a href="#support" class="active">Support Center</a>
            <a href="#contact">Contact Center</a>
        </div>
    </nav>


<img src="https://i.postimg.cc/t4qvhVYV/file_000000000bb4622fafa66b616c5d7799.png" alt="EGY LAMPA">
<body style="background-color: #F1F5F9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <div style="background: white; border: 1px solid #E2E8F0; width: 100%; max-width: 400px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(26, 54, 93, 0.08); text-align: center;">
        
        <div style="margin-bottom: 30px;">
            <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
            <h2 style="color: #1A365D; margin: 0 0 5px 0; font-size: 22px; font-weight: 700;">JBS TERMINAL GATEWAY</h2>
            <p style="color: #64748B; font-size: 13px; margin: 0;">Authorized Logistics Auditing Access Only</p>
        </div>

        {% if error %}
        <div style="background-color: #FFF1F2; border: 1px solid #FDA4AF; color: #E11D48; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 20px; text-align: left;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" style="text-align: left;">
            <div style="margin-bottom: 18px;">
                <label style="display: block; font-size: 12px; font-weight: 700; color: #1A365D; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Operator ID</label>
                <input type="text" name="username" placeholder="Enter username" required style="width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#1A365D'">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-size: 12px; font-weight: 700; color: #1A365D; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Security Passkey</label>
                <input type="password" name="password" placeholder="Enter password" required style="width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#1A365D'">
            </div>

            <button type="submit" style="width: 100%; background-color: #1A365D; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#2A4365'" onmouseout="this.style.backgroundColor='#1A365D'">
                Initialize Secure Session
            </button>
        </form>

        <div style="margin-top: 30px; border-top: 1px solid #E2E8F0; padding-top: 20px;">
            <p style="font-size: 11px; color: #94A3B8; margin: 0;">John Billing Logistics Terminal © 2026<br/>KRA Fiscal Sync Station Active</p>
        </div>
    </div>
    <div class="login-container">
  <h2>Sign In</h2>
  <form id="loginForm">
    <div class="input-group">
      <label for="username">Username or Email</label>
      <input type="text" id="username" name="username" required placeholder="Enter your username">
    </div>
    
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Enter your password">
    </div>
    
    <button type="submit" class="login-btn">Sign In</button>
    <input type="submit" value="Sign In">
  </form>
</div>

    <script src="script.js"></script>
</body>
</html>
