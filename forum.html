<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBS - Community Hub Forum</title>
   <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1a1f2c;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-primary); padding: 20px; }

        .forum-layout { display: grid; grid-template-columns: 240px 1fr 28px; gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* Sidebar Styling */
        .forum-sidebar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; height: fit-content; }
        .sidebar-title { font-size: 1rem; margin-bottom: 15px; color: var(--accent-green); text-transform: uppercase; letter-spacing: 0.5px; }
        .category-list { list-style: none; }
        .category-item { padding: 8px 12px; border-radius: 4px; margin-bottom: 5px; cursor: pointer; color: var(--text-secondary); font-size: 0.9rem; transition: 0.2s; }
        .category-item:hover, .category-item.active { background: var(--border-color); color: var(--text-primary); }

        /* Main Feed Engine Window Layout */
        .feed-container { display: flex; flex-direction: column; gap: 20px; }

        /* Post Creation Card */
        .create-post-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; }
        .post-input { width: 100%; min-height: 80px; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; color: var(--text-primary); resize: vertical; font-size: 0.95rem; margin-bottom: 10px; }
        .post-input:focus { outline: 1px solid var(--accent-green); }
        .actions-row { display: flex; justify-content: space-between; align-items: center; }
        .file-upload-btn { background: var(--border-color); color: var(--text-primary); padding: 8px 14px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .file-upload-btn:hover { background: #475569; }
        .submit-btn { background: var(--accent-green); color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { opacity: 0.9; }

        /* Preview Target Image Panel Box */
        #preview-box { margin-top: 10px; position: relative; display: none; }
        #image-preview { max-width: 100%; max-height: 200px; border-radius: 6px; border: 1px solid var(--border-color); }
        .remove-preview { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }

        /* Social Media Style Feed Cards */
        .post-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar { width: 45px; height: 45px; background: var(--border-color); border-radius: 5px; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; }
        .user-name-row { display: flex; align-items: center; gap: 8px; }
        .user-fullname { font-weight: bold; font-size: 0.95rem; }
        .badge { background: var(--accent-blue); font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
        .badge.admin { background: #ef4444; }
        .business-details { font-size: 0.8rem; color: var(--text-secondary); }
        .post-time { font-size: 0.75rem; color: var(--text-secondary); margin-left: auto; }

        .post-content { font-size: 0.95rem; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; }
        .post-image { max-width: 100%; border-radius: 6px; margin-bottom: 12px; border: 1px solid var(--border-color); }

        .post-footer { display: flex; gap: 20px; border-top: 1px solid var(--border-color); padding-top: 12px; font-size: 0.85rem; color: var(--text-secondary); }
        .footer-action-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .footer-action-btn:hover { color: var(--text-primary); }

        /* Custom Global Notification Bell Float Widget */
        .notif-bell-holder { position: relative; cursor: pointer; font-size: 1.3rem; display: flex; justify-content: center; }
        .jbs-notification-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.65rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="forum-layout">
        
        <aside class="forum-sidebar">
            <h3 class="sidebar-title">Categories</h3>
            <ul class="category-list">
                <li class="category-item active" onclick="filterCategory('General Discussions', this)">General</li>
                <li class="category-item" onclick="filterCategory('Business Advice', this)">Business Advice</li>
                <li class="category-item" onclick="filterCategory('Accounting', this)">Accounting</li>
                <li class="category-item" onclick="filterCategory('Inventory Management', this)">Inventory</li>
                <li class="category-item" onclick="filterCategory('Agriculture', this)">Agriculture</li>
                <li class="category-item" onclick="filterCategory('Technology', this)">Technology</li>
            </ul>
        </aside>

        <main class="feed-container">
            
            <section class="create-post-card">
                <textarea id="postText" class="post-input" placeholder="Share a business update, ask a question, or post a daily tip..."></textarea>
                
                <div id="preview-box">
                    <button class="remove-preview" onclick="clearImagePreview()">✕</button>
                    <img id="image-preview" src="" alt="Selected Preview Asset">
                </div>

                <div class="actions-row">
                    <label class="file-upload-btn">
                        📷 Add Picture Image File
                        <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="handleFileSelection(event)">
                    </label>
                    <button class="submit-btn" onclick="publishRealtimePost()">Publish Post Entry</button>
                </div>
            </section>

            <div id="forum-feed-target">
                </div>

        </main>

        <div class="notif-bell-holder" title="System Alerts Notification Panel">
            🔔
            <span class="jbs-notification-badge" id="forumNotifBadge">0</span>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // 1. Establish real-time websocket handshake connection matrix 
        const socket = io();
        let selectedUploadedImageUrl = null;
        let selectedCategory = "General Discussions";

        // 2. Fetch initial database history feed records on window load
        window.onload = function() {
            fetch('/get-posts')
            .then(res => res.json())
            .then(data => {
                if(data.posts) {
                    data.posts.forEach(post => renderPostToDOM(post, false));
                }
            });
        };

        // 3. Image File Pre-processing & Selection Hook
        function handleFileSelection(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Instantly display local image preview framework box
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('preview-box').style.display = 'block';
            };
            reader.readAsDataURL(file);

            // Execute automated streaming upload directly onto flat root directory
            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload-image', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.image_url) {
                    selectedUploadedImageUrl = data.image_url;
                }
            })
            .catch(err => console.error("Media processing loop infrastructure failure:", err));
        }

        function clearImagePreview() {
            document.getElementById('imageFile').value = "";
            document.getElementById('image-preview').src = "";
            document.getElementById('preview-box').style.display = 'none';
            selectedUploadedImageUrl = null;
        }

        // 4. Emit Post Data to Python Flask via Socket.IO
        function publishRealtimePost() {
            const contentText = document.getElementById('postText').value.trim();
            if(!contentText && !selectedUploadedImageUrl) return;

            const postPayload = {
                content: contentText,
                image_url: selectedUploadedImageUrl,
                category: selectedCategory
            };

            // Emit via WebSocket connection pool link
            socket.emit('create-post', postPayload);

            // Clear inputs locally
            document.getElementById('postText').value = "";
            clearImagePreview();
        }

        // 5. Dynamic Feed DOM Renderer Engine
        function renderPostToDOM(post, prepend = true) {
            const feed = document.getElementById('forum-feed-target');
            
            const card = document.createElement('div');
            card.className = "post-card";
            card.style.marginBottom = "20px";
            card.setAttribute('data-post-id', post.id);

            // Conditional badge rendering rules configuration matching badge string identities
            const isAdmin = post.user.badge === "Admin" ? "admin" : "";
            
            // Build dynamic layout card strings
            let mediaImageTag = post.image_url ? `<img src="${post.image_url}" class="post-image" alt="Embedded Post Image Layout">` : '';

            card.innerHTML = `
                <div class="post-header">
                    <img src="${post.user.profile_image}" class="avatar" alt="Avatar Asset Line">
                    <div class="user-info">
                        <div class="user-name-row">
                            <span class="user-fullname">${post.user.full_name}</span>
                            <span class="badge ${isAdmin}">${post.user.badge}</span>
                        </div>
                        <span class="business-details">${post.user.business_name || 'Independent Vendor'} • @${post.user.username}</span>
                    </div>
                    <span class="post-time">${post.created_at}</span>
                </div>
                <div class="post-content">${post.content}</div>
                ${mediaImageTag}
                <div class="post-footer">
                    <div class="footer-action-btn" onclick="triggerLikeSignal(${post.id})">👍 Like (<span class="like-counter">${post.likes_count}</span>)</div>
                    <div class="footer-action-btn">💬 Comment (<span class="comment-counter">${post.comments_count}</span>)</div>
                </div>
            `;

            if(prepend) {
                feed.insertBefore(card, feed.firstChild);
            } else {
                feed.appendChild(card);
            }
        }

        // 6. Real-Time Socket Event Receivers
        socket.on('new-post-broadcast', function(postData) {
            renderPostToDOM(postData, true);
        });

        function triggerLikeSignal(postId) {
            socket.emit('like-post', { post_id: postId });
        }

        socket.on('like-update-broadcast', function(data) {
            const targetCard = document.querySelector(`[data-post-id="${data.post_id}"] .like-counter`);
            if (targetCard) {
                targetCard.innerText = data.total_likes;
            }
        });

        // 7. Global Cross-Page Notification Updates Interface Handler Matrix
        socket.on('global-system-alert', function(data) {
            const badge = document.getElementById('forumNotifBadge');
            if(badge) {
                let count = parseInt(badge.innerText) || 0;
                badge.innerText = count + 1;
                badge.style.display = 'block';
            }
            if (Notification.permission === "granted") {
                new Notification(data.title, { body: data.message });
            }
        });

        function filterCategory(categoryName, element) {
            selectedCategory = categoryName;
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
