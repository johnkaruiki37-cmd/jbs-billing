
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operations Dashboard | Ledger Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-navigation">
        <div class="nav-logo">JOHN BILLING SYSTEM</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/">login</a>
            <a href="dashboard" class="active">Dashboard</a>
            <a href="support">Support Center</a>
            <a href="contact">Contact Center</a>
        </div>
    </nav>
<div class="sharing-container">
  <h2>Document Hub & Dispatch</h2>
  <p>Drag and drop your invoice or document below, then choose how to send it.</p>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-prompt">
      <span class="drop-icon">📂</span>
      <p>Drag & Drop your Invoice PDF here</p>
      <span>or click to browse files</span>
    </div>
    <input type="file" id="fileInput" class="file-input" accept=".pdf,.doc,.docx,image/*">
  </div>
  
  <div id="filePreview" class="file-preview" style="display: none;">
    <span class="file-name" id="fileName">invoice.pdf</span>
    <button type="button" id="removeFileBtn" class="remove-btn">&times;</button>
  </div>

  <hr class="divider">

  <div class="input-section">
    <div class="field-group">
      <label for="whatsappNumber">WhatsApp Number (with country code)</label>
      <input type="tel" id="whatsappNumber" placeholder="e.g., 254712345678" value="254">
    </div>

    <div class="field-group">
      <label for="emailAddress">Recipient Email Address</label>
      <input type="email" id="emailAddress" placeholder="customer@example.com">
    </div>
  </div>

  <div class="action-buttons">
    <button id="sendWhatsApp" class="btn btn-whatsapp">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp"> Send via WhatsApp
    </button>
    <button id="sendGmail" class="btn btn-gmail">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Gmail"> Send via Gmail
    </button>
  </div>
</div>
 <script src="script.js"></script>
 </body>
</html>
