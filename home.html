<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBS - Professional Invoicing System</title>
    <style>
        :root {
            --primary: #0F2C59;
            --accent: #3182CE;
            --bg: #F7FAFC;
            --surface: #FFFFFF;
            --text: #2D3748;
            --border: #E2E8F0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 30px; }
        .dashboard-container { max-width: 1100px; margin: 0 auto; background: var(--surface); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 35px; border: 1px solid var(--border); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .sys-title { font-size: 14px; text-transform: uppercase; font-weight: 700; color: #718096; letter-spacing: 1px; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 35px; }
        .panel { background: #F8FAFC; border-radius: 8px; padding: 20px; border: 1px solid var(--border); }
        .panel-heading { font-size: 12px; text-transform: uppercase; font-weight: 700; color: #4A5568; margin-bottom: 12px; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #4A5568; margin-bottom: 5px; }
        .form-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; color: var(--text); outline: none; transition: border 0.2s; }
        .form-input:focus { border-color: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th { background: var(--primary); color: #fff; padding: 12px; text-align: left; font-size: 13px; text-transform: uppercase; font-weight: 600; }
        th:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
        th:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; }
        td { padding: 12px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #071D3D; }
        .btn-accent { background: var(--accent); color: white; margin-top: 10px; }
        .btn-accent:hover { background: #2B6CB0; }
        .summary-wrapper { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 20px; }
        .totals-box { width: 320px; background: #F8FAFC; border-radius: 8px; padding: 20px; border: 1px solid var(--border); }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .grand-total { font-size: 18px; font-weight: 800; color: var(--primary); border-top: 2px dashed var(--border); padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <div class="logo">JBS<span>.</span></div>
        <div class="sys-title">Invoicing Ledger Workspace</div>
    </div>

    <div class="meta-grid">
        <div class="panel">
            <div class="panel-heading">Customer Meta Details</div>
            <div class="form-group">
                <label>Client Corporate Name</label>
                <input type="text" id="client-name" class="form-input" value="Savannah Rangers & Outpost Ltd">
            </div>
            <div class="form-group">
                <label>KRA PIN Identifier</label>
                <input type="text" id="client-pin" class="form-input" value="P011987654X">
            </div>
        </div>
        <div class="panel">
            <div class="panel-heading">Ledger Tracking Inclusions</div>
            <div class="form-group">
                <label>Invoice Token Reference</label>
                <input type="text" id="invoice-no" class="form-input" value="JBS-2026-0089">
            </div>
            <div class="form-group">
                <label>Settlement Due Date</label>
                <input type="date" id="due-date" class="form-input" value="2026-06-22">
            </div>
        </div>
    </div>

    <div class="panel" style="background:transparent; padding:0; border:none;">
        <div class="panel-heading" style="padding-left:5px;">Line Items Inventory Breakdown</div>
        <table>
            <thead>
                <tr>
                    <th style="width: 50%;">Item / Service Description</th>
                    <th style="width: 15%; text-align: center;">Qty</th>
                    <th style="width: 18%; text-align: right;">Rate (KES)</th>
                    <th style="width: 17%; text-align: right;">Total</th>
                </tr>
            </thead>
            <tbody id="invoice-table-body">
                <tr class="invoice-row">
                    <td><input type="text" class="form-input item-desc" value="Enterprise Cloud Architecture Deployment"></td>
                    <td><input type="number" class="form-input item-qty" value="1" style="text-align:center;" oninput="calculateTotals()"></td>
                    <td><input type="number" class="form-input item-price" value="45000" style="text-align:right;" oninput="calculateTotals()"></td>
                    <td class="item-total" style="text-align: right; font-weight: 600;">45,000.00</td>
                </tr>
            </tbody>
        </table>
        <button class="btn btn-accent" onclick="addRecordLine()">+ Append New Line Item</button>
    </div>

    <div class="summary-wrapper">
        <div class="action-panel">
            <button class="btn btn-primary" onclick="compileAndDownloadPDF()">Compile Compliant Ledger Document (PDF)</button>
        </div>
        <div class="totals-box">
            <div class="total-row">
                <span>Subtotal:</span>
                <span id="summary-subtotal" style="font-weight:600;">KES 45,000.00</span>
            </div>
            <div class="total-row">
                <span>VAT Breakdown (16%):</span>
                <span id="summary-vat" style="font-weight:600;">KES 7,200.00</span>
            </div>
            <div class="total-row grand-total">
                <span>Aggregate Total:</span>
                <span id="summary-grand-total">KES 52,200.00</span>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
